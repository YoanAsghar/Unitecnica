<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Scriptorium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Contenedor Principal -->
    <div class="auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-header">
                <h1 class="auth-title">Iniciar Sesión</h1>
                <p class="auth-subtitle">Accede a tu cuenta para continuar</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="tu@email.com"
                        required
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-group form-checkbox">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember" 
                        class="form-checkbox-input"
                    >
                    <label for="remember" class="form-checkbox-label">Recuérdame en este dispositivo</label>
                </div>

                <button type="submit" class="form-button">Iniciar Sesión</button>
                <span class="form-error" id="formError"></span>
            </form>

            <div class="auth-footer">
                <p class="auth-footer-text">
                    ¿No tienes cuenta? 
                    <a href="../register/index.html" class="auth-footer-link">Regístrate aquí</a>
                </p>
                <p class="auth-footer-text">
                    ¿Olvidaste tu contraseña? 
                    <a href="#" class="auth-footer-link">Recupérala</a>
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
