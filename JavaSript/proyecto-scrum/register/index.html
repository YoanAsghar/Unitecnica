<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Scriptorium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Contenedor Principal -->
    <div class="auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-header">
                <h1 class="auth-title">Crear Cuenta</h1>
                <p class="auth-subtitle">Únete a Scriptorium y comienza a compartir conocimiento</p>
            </div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label for="name" class="form-label">Nombre Completo</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        class="form-input" 
                        placeholder="Juan Pérez"
                        required
                    >
                    <span class="form-error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="tu@email.com"
                        required
                    >
                    <span class="form-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                    <span class="form-error" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                    <span class="form-error" id="confirmPasswordError"></span>
                </div>

                <div class="form-group form-checkbox">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        class="form-checkbox-input"
                        required
                    >
                    <label for="terms" class="form-checkbox-label">
                        Acepto los términos y condiciones de servicio
                    </label>
                    <span class="form-error" id="termsError"></span>
                </div>

                <button type="submit" class="form-button">Crear Cuenta</button>
                <span class="form-error" id="formError"></span>
            </form>

            <div class="auth-footer">
                <p class="auth-footer-text">
                    ¿Ya tienes cuenta? 
                    <a href="../login/index.html" class="auth-footer-link">Inicia sesión aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
